<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA MVP Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&family=Patrick+Hand&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
        }

        body {
            background: #050924;
            color: white;
            font-family: 'Patrick Hand SC', cursive;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            background: #10184d;
            border-bottom: 3px solid #a6a6a6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 22px;
            height: 80px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: nowrap;
            width: 100%;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: normal;
            color: #f5f5f5;
            text-decoration: none;
            text-shadow: 1px 1px 4px rgba(245, 245, 245, 0.75);
            font-family: 'Patrick Hand SC', cursive;
            transition: opacity 0.2s ease, text-shadow 0.2s ease;
        }

        .logo:hover {
            opacity: 0.85;
            text-shadow: 1px 1px 8px rgba(99, 208, 255, 0.9);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: nowrap;
        }

        .nav-btn {
            text-decoration: none;
            background: #f5f5f5;
            color: #222;
            padding: 5px 20px;
            border-radius: 12px;
            border: 3px solid #a6a6a6;
            font-size: 1.4rem;
            font-family: 'Patrick Hand', cursive;
            line-height: 1.4;
            white-space: nowrap;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }

        .nav-btn:hover {
            background: #63d0ff;
            transform: translateY(-2px);
            box-shadow: 0 3px 6px rgba(99, 208, 255, 0.4);
        }

        .nav-btn:active {
            transform: translateY(1px);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .player-layout {
            display: flex;
            min-height: calc(100vh - 80px);
            align-items: flex-start;
        }

        /* SIDEBAR */
        .jump-sidebar {
            width: 180px;
            min-width: 180px;
            background: #10184d;
            border: 3px solid #a6a6a6;
            border-radius: 0 16px 16px 0;
            padding: 22px 18px;
            align-self: flex-start;
            margin-top: 30px;
            margin-left: -3px;
            position: sticky;
            top: 90px;
        }

        .jump-title {
            font-size: 1.15rem;
            font-family: 'Patrick Hand', cursive;
            color: #f5f5f5;
            margin-bottom: 14px;
        }

        .jump-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #f5f5f5;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.1rem;
            padding: 6px 0;
            line-height: 1.3;
            transition: opacity 0.2s;
        }

        .jump-link:hover {
            opacity: 0.75;
        }

        .jump-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #f58426;
            background: transparent;
            flex-shrink: 0;
        }

        /* MAIN CONTENT */
        .player-page {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            padding: 30px 22px 60px;
            margin: 0 auto;
            align-self: flex-start;
        }

        .top-section, .stats-section, .bio-section {
            width: 100%;
        }

        .trophy-case, .stats-section {
            width: 100%;
        }

        .back-link {
            display: inline-block;
            color: #f5f5f5;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.2rem;
            text-decoration: none;
            margin-bottom: 16px;
            transition: color 0.2s ease, transform 0.2s ease, text-shadow 0.2s ease;
        }

        .back-link:hover {
            opacity: 1;
            color: #63d0ff;
            transform: translateX(-4px);
            text-shadow: 1px 1px 6px rgba(99, 208, 255, 0.5);
            text-decoration: none;
        }

        .player-hero {
            display: flex;
            justify-content: center;
            margin: 0 0 30px;
        }

        .title-box {
            background: #63d0ff;
            border: 3px solid #a6a6a6;
            border-radius: 16px;
            padding: 16px 30px;
            text-align: center;
            max-width: 100%;
        }

        .title-box h1 {
            color: #050924;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-family: 'Patrick Hand SC', cursive;
            font-weight: normal;
            text-shadow: 1px 1px 4px rgba(5, 9, 36, 0.75);
        }

        .top-section {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        .player-portrait {
            flex-shrink: 0;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .portrait-image {
            width: 240px;
            height: 240px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .portrait-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center bottom;
        }

        .portrait-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            padding: 12px;
            line-height: 1.3;
        }

        .trophy-case {
            flex: 1;
            min-width: 0;
            background: #63d0ff;
            border: 3px solid #a6a6a6;
            border-radius: 16px;
            padding: 20px 24px;
            min-height: 240px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .trophy-case h2 {
            text-align: center;
            color: #050924;
            font-size: 2rem;
            font-family: 'Patrick Hand SC', cursive;
            font-weight: normal;
            text-shadow: 1px 1px 4px rgba(5, 9, 36, 0.75);
            margin-bottom: 18px;
        }

        .trophy-scroll {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding: 8px 4px 16px;
            scrollbar-color: #a6a6a6 #63d0ff;
            flex: 1;
            align-items: center;
        }

        .trophy-scroll::-webkit-scrollbar {
            height: 10px;
        }

        .trophy-scroll::-webkit-scrollbar-track {
            background: rgba(5, 9, 36, 0.1);
            border-radius: 10px;
        }

        .trophy-scroll::-webkit-scrollbar-thumb {
            background: #a6a6a6;
            border-radius: 10px;
        }

        .trophy-item {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 280px;
        }

        .trophy-icon {
            font-size: 4rem;
            line-height: 1;
        }

        .trophy-info {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.05rem;
            color: #050924;
            line-height: 1.8;
        }

        .trophy-info li {
            margin-left: 20px;
        }

        .stats-section {
            background: #63d0ff;
            border: 3px solid #a6a6a6;
            border-radius: 16px;
            padding: 24px 30px;
            margin-bottom: 40px;
        }

        .stats-section h2 {
            text-align: center;
            color: #050924;
            font-size: 2.2rem;
            font-family: 'Patrick Hand SC', cursive;
            font-weight: normal;
            text-shadow: 1px 1px 4px rgba(5, 9, 36, 0.75);
            margin-bottom: 18px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 40px;
            font-family: 'Patrick Hand', cursive;
            color: #050924;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .stats-grid li {
            margin-left: 24px;
        }

        .bio-section {
            margin-bottom: 50px;
        }

        .bio-section > h2 {
            font-family: 'Patrick Hand SC', cursive;
            font-size: 2.4rem;
            font-weight: normal;
            color: #f5f5f5;
            text-shadow: 1px 1px 4px rgba(245, 245, 245, 0.75);
            margin-bottom: 20px;
        }

        .bio-block {
            margin-bottom: 32px;
        }

        .bio-block h3 {
            font-family: 'Patrick Hand SC', cursive;
            font-size: 1.7rem;
            font-weight: normal;
            color: #f5f5f5;
            margin-bottom: 12px;
        }

        .bio-block p {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.1rem;
            line-height: 2;
            color: #f5f5f5;
            text-indent: 15px;
            margin-bottom: 12px;
        }

        @media (max-width: 1400px) {
            .navbar {
                padding: 0 16px;
            }

            .logo {
                font-size: 1.95rem;
            }

            .nav-buttons {
                gap: 10px;
            }

            .nav-btn {
                font-size: 1.1rem;
                padding: 5px 14px;
            }
        }

        @media (min-width: 1200px) {
            .player-page {
                padding-left: 22px;
                padding-right: 22px;
            }
        }

        @media (max-width: 1450px) and (min-width: 1101px) {
            .player-page {
                max-width: calc(100vw - 230px);
            }

            .top-section {
                gap: 24px;
            }

            .trophy-item {
                min-width: 240px;
            }
        }

        @media (max-width: 1100px) {
            .navbar {
                padding: 12px 16px;
                height: auto;
                flex-wrap: nowrap;
                gap: 10px;
            }

            .logo {
                font-size: 1.8rem;
            }

            .nav-buttons {
                flex-wrap: nowrap;
                justify-content: flex-end;
                gap: 10px;
            }

            .nav-btn {
                font-size: 1rem;
                padding: 6px 14px;
            }

            .jump-sidebar {
                display: none;
            }

            .player-layout {
                display: block;
            }

            .player-page {
                padding: 24px 20px 50px;
                max-width: 100%;
            }

            .title-box {
                width: min(560px, 100%);
                padding: 14px 20px;
            }

            .top-section {
                flex-direction: column;
                align-items: center;
                gap: 24px;
                margin-bottom: 28px;
            }

            .player-portrait {
                display: flex;
                justify-content: center;
                width: 100%;
            }

            .portrait-image {
                width: 220px;
                height: 220px;
            }

            .trophy-case {
                width: 100%;
                min-height: 220px;
                padding: 18px 20px;
            }

            .trophy-case h2 {
                font-size: 1.6rem;
            }

            .trophy-item {
                min-width: 240px;
            }

            .trophy-icon {
                font-size: 3.2rem;
            }

            .stats-section {
                width: 100%;
                padding: 22px 24px;
                margin-bottom: 32px;
            }

            .stats-section h2 {
                font-size: 1.8rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 4px;
                font-size: 1rem;
            }

            .bio-section > h2 {
                font-size: 2rem;
            }

            .bio-block h3 {
                font-size: 1.5rem;
            }

            .bio-block p {
                font-size: 1rem;
            }
        }

        @media (max-width: 700px) {
            .navbar {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                flex-wrap: nowrap;
            }

            .nav-buttons {
                width: auto;
                justify-content: flex-end;
                flex-wrap: nowrap;
                gap: 8px;
            }

            .logo {
                font-size: 1.55rem;
            }

            .nav-btn {
                font-size: 0.9rem;
                padding: 5px 8px;
            }

            .player-page {
                padding: 20px 16px 40px;
            }

            .back-link {
                font-size: 1.05rem;
                margin-bottom: 14px;
            }

            .player-hero {
                margin-bottom: 22px;
            }

            .title-box {
                width: 100%;
                padding: 12px 16px;
            }

            .portrait-image {
                width: 190px;
                height: 190px;
            }

            .top-section {
                gap: 20px;
                margin-bottom: 24px;
            }

            .trophy-case {
                width: 100%;
                min-height: unset;
                padding: 16px;
            }

            .trophy-case h2 {
                font-size: 1.45rem;
                margin-bottom: 14px;
            }

            .trophy-scroll {
                gap: 16px;
                padding: 6px 2px 12px;
            }

            .trophy-item {
                min-width: 210px;
                gap: 10px;
            }

            .trophy-icon {
                font-size: 2.8rem;
            }

            .trophy-info {
                font-size: 0.95rem;
            }

            .stats-section {
                width: 100%;
                padding: 18px 16px;
                margin-bottom: 28px;
            }

            .stats-section h2 {
                font-size: 1.45rem;
                margin-bottom: 14px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 0;
                font-size: 0.95rem;
            }

            .stats-grid li {
                margin-left: 20px;
            }

            .bio-section > h2 {
                font-size: 1.7rem;
            }

            .bio-block {
                margin-bottom: 24px;
            }

            .bio-block h3 {
                font-size: 1.3rem;
            }

            .bio-block p {
                font-size: 0.95rem;
                line-height: 1.9;
                text-indent: 10px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.35rem;
            }

            .nav-btn {
                font-size: 0.8rem;
                padding: 4px 6px;
            }

            .player-page {
                padding: 18px 12px 34px;
            }

            .title-box {
                border-radius: 12px;
                padding: 10px 12px;
            }

            .title-box h1 {
                line-height: 1.15;
            }

            .portrait-image {
                width: 160px;
                height: 160px;
                border-radius: 16px;
            }

            .trophy-case, .stats-section {
                border-radius: 12px;
                padding: 14px 12px;
            }

            .trophy-item {
                min-width: 190px;
            }

            .trophy-icon {
                font-size: 2.4rem;
            }

            .trophy-info {
                font-size: 0.9rem;
                line-height: 1.6;
            }

            .stats-section h2, .trophy-case h2 {
                font-size: 1.3rem;
            }

            .bio-section > h2 {
                font-size: 1.5rem;
            }

            .bio-block h3 {
                font-size: 1.15rem;
            }

            .bio-block p {
                font-size: 0.9rem;
                line-height: 1.8;
                text-indent: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Nav Bar -->
    <header class="navbar">
        <a href="index.html" class="logo">NBA MVP</a>
        <nav class="nav-buttons">
            <a href="explore.html" class="nav-btn">Explore Players</a>
            <a href="about.html" class="nav-btn">About</a>
        </nav>
    </header>

    <div class="player-layout">

        <!-- Sidebar -->
        <aside class="jump-sidebar">
            <p class="jump-title">Jump To</p>
            <a href="#trophycase" class="jump-link">
                <span class="jump-icon"></span> Trophy Case
            </a>
            <a href="#quickfacts" class="jump-link">
                <span class="jump-icon"></span> Quick Facts
            </a>
            <a href="#bio" class="jump-link">
                <span class="jump-icon"></span> Player Bio
            </a>
        </aside>

        <!-- Main Content -->
        <main class="player-page" id="playerPage">

        </main>

    </div>

    <!-- Player data -->
    <script src="players_data.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const playerId = params.get('id');
        const player = PLAYER_PROFILES[playerId];

        const page = document.getElementById('playerPage');

        if (!player) {
            page.innerHTML = `
        <a href="explore.html" class="back-link">&lt; Explore the Greatness</a>
        <div style="text-align:center;padding:80px 20px;font-family:'Patrick Hand',cursive;">
          <h1 style="font-family:'Patrick Hand SC',cursive;font-size:2.4rem;margin-bottom:16px;">Player Not Found</h1>
          <p style="font-size:1.2rem;margin-bottom:24px;">We couldn't find that player's profile.</p>
          <a href="explore.html" style="display:inline-block;background:#db2c3a;color:#f5f5f5;border:3px solid #f5f5f5;border-radius:10px;padding:10px 24px;text-decoration:none;font-size:1.15rem;box-shadow:2px 2px 4px rgba(245,245,245,0.75);">Back to Explore</a>
        </div>`;
        } else {
            document.title = `NBA MVP - ${player.fullName}`;

            const portraitInner = player.img
                ? `<img src="${player.img}" alt="${player.fullName}">`
                : `<div class="portrait-placeholder">${player.firstName}<br>${player.lastName}</div>`;

            const trophyItems = player.trophies.map(t => `
        <div class="trophy-item">
          <div class="trophy-icon">🏆</div>
          <ul class="trophy-info">
            <li>Number: ${t.number}</li>
            <li>Year Awarded: ${t.year}</li>
            <li>Team: ${t.team}</li>
          </ul>
        </div>
      `).join('');

            const s = player.quickStats;
            const leftStats = `
        <ul>
          <li>Numbers: ${s.numbers}</li>
          <li>Positions: ${s.positions}</li>
          <li>Teams: ${s.teams}</li>
          <li>Status: ${s.status}</li>
        </ul>`;
            const rightStats = `
        <ul>
          <li>Nicknames: ${s.nicknames}</li>
          <li>Age: ${s.age}</li>
          <li>Hometown: ${s.hometown}</li>
          <li>College: ${s.college}</li>
        </ul>`;

            const careerHTML = player.careerOverview.map(p => `<p>${p}</p>`).join('');
            const offCourtHTML = player.offCourt.map(p => `<p>${p}</p>`).join('');

            page.innerHTML = `
        <a href="explore.html" class="back-link">&lt; Explore the Greatness</a>

        <section class="player-hero">
          <div class="title-box">
            <h1>${player.fullName}</h1>
          </div>
        </section>

        <section class="top-section">
          <div class="player-portrait">
            <div class="portrait-image" style="background: ${player.color};">
              ${portraitInner}
            </div>
          </div>

          <div class="trophy-case" id="trophycase">
            <h2>Trophy Case</h2>
            <div class="trophy-scroll">
              ${trophyItems}
            </div>
          </div>
        </section>

        <section class="stats-section" id="quickfacts">
          <h2>Quick Statistics &amp; Facts</h2>
          <div class="stats-grid">
            ${leftStats}
            ${rightStats}
          </div>
        </section>

        <section class="bio-section" id="bio">
          <h2>Player Biography</h2>

          <div class="bio-block">
            <h3>Career Overview</h3>
            ${careerHTML}
          </div>

          <div class="bio-block">
            <h3>Off The Court</h3>
            ${offCourtHTML}
          </div>
        </section>
      `;
        }

        document.querySelectorAll('.jump-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href.startsWith('#')) {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    const target = document.querySelector(href);
                    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            }
        });
    </script>
</body>

</html>
