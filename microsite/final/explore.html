<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA MVP Explore</title>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&family=Patrick+Hand&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050924;
      color: white;
      font-family: 'Patrick Hand SC', cursive;
    }

    /* NAVBAR */
    .navbar {
      background: #10184d;
      border-bottom: 3px solid #a6a6a6;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 22px;
      height: 80px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: nowrap;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: normal;
      color: #f5f5f5;
      text-decoration: none;
      text-shadow: 1px 1px 4px rgba(245, 245, 245, 0.75);
      font-family: 'Patrick Hand SC', cursive;
      transition: opacity 0.2s ease, text-shadow 0.2s ease;
    }

    .logo:hover {
      opacity: 0.85;
      text-shadow: 1px 1px 8px rgba(99, 208, 255, 0.9);
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: nowrap;
    }

    .nav-btn {
      text-decoration: none;
      background: #f5f5f5;
      color: #222;
      padding: 5px 20px;
      border-radius: 12px;
      border: 3px solid #a6a6a6;
      font-size: 1.4rem;
      font-family: 'Patrick Hand', cursive;
      line-height: 1.4;
      white-space: nowrap;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .nav-btn:hover {
      background: #63d0ff;
      transform: translateY(-2px);
      box-shadow: 0 3px 6px rgba(99, 208, 255, 0.4);
    }

    .nav-btn:active {
      transform: translateY(1px);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    /* EXPLORE PAGE */
    .explore-page {
      width: 100%;
      min-height: 100vh;
      padding: 30px 40px 50px;
    }

    .explore-hero {
      display: flex;
      justify-content: center;
      margin: 10px 0 30px;
    }

    .hero-title-box {
      background: #63d0ff;
      border: 3px solid #a6a6a6;
      border-radius: 16px;
      width: min(620px, 100%);
      text-align: center;
      padding: 16px 20px;
    }

    .hero-title-box h1 {
      color: #050924;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Patrick Hand SC', cursive;
      font-weight: normal;
      text-shadow: 1px 1px 4px rgba(5, 9, 36, 0.75);
    }

    .controls-section {
      margin-bottom: 28px;
    }

    .search-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 22px;
    }

    .search-bar {
      width: min(260px, 100%);
      max-width: 100%;
      padding: 10px 16px;
      border-radius: 12px;
      border: 3px solid #a6a6a6;
      outline: none;
      font-size: 1.4rem;
      text-align: center;
      background: #f5f5f5;
      color: #111;
      font-family: 'Patrick Hand', cursive;
      box-shadow: 2px 2px 4px rgba(166, 166, 166, 0.75);
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 1.15rem;
      font-family: 'Patrick Hand', cursive;
      color: #f5f5f5;
    }

    .filter-buttons {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: #db2c3a;
      color: #f5f5f5;
      border: 3px solid #f5f5f5;
      border-radius: 8px;
      padding: 6px 22px;
      min-width: 110px;
      font-size: 1.15rem;
      cursor: pointer;
      font-family: 'Patrick Hand', cursive;
      box-shadow: 2px 2px 4px rgba(245, 245, 245, 0.75);
      text-align: center;
      transition: box-shadow 0.2s;
    }

    .filter-btn.active {
      box-shadow: 0 0 6px 6px rgba(245, 245, 245, 0.5);
    }

    .filter-btn:hover {
      opacity: 0.85;
    }

    .section-header {
      background: #63d0ff;
      border: 3px solid #a6a6a6;
      border-radius: 16px;
      text-align: center;
      padding: 10px 20px;
      margin: 70px 0 36px;
    }

    .section-header:first-child {
      margin-top: 0;
    }

    .section-header h2 {
      color: #050924;
      font-size: 2rem;
      font-family: 'Patrick Hand SC', cursive;
      font-weight: normal;
      text-shadow: 1px 1px 4px rgba(5, 9, 36, 0.75);
    }

    /* GRID */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 24px 20px;
    }

    .player-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-decoration: none;
      color: inherit;
    }

    article.player-card {
      opacity: 0.5;
      cursor: default;
    }

    article.player-card .player-image {
      filter: grayscale(5%);
    }

    a.player-card {
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    a.player-card:hover {
      transform: translateY(-4px);
    }

    a.player-card:hover .player-image {
      box-shadow: 0 6px 14px rgba(245, 245, 245, 0.25);
      outline: 3px solid #63d0ff;
      outline-offset: 2px;
    }

    a.player-card:hover .player-name {
      color: #63d0ff;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .player-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      transition: box-shadow 0.2s ease;
    }

    .player-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center bottom;
      position: relative;
      z-index: 1;
    }

    .player-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Patrick Hand', cursive;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      padding: 8px;
      line-height: 1.3;
    }

    .player-name {
      margin-top: 6px;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      line-height: 1.3;
      color: #f5f5f5;
      font-family: 'Patrick Hand', cursive;
    }

    .no-results {
      text-align: center;
      font-size: 1.5rem;
      color: #a6a6a6;
      font-family: 'Patrick Hand', cursive;
      padding: 60px 0;
    }

    /* FOOTER */
    .site-footer {
      background: #10184d;
      border-top: 3px solid #a6a6a6;
      padding: 40px 50px 30px;
      color: #f5f5f5;
      font-family: 'Patrick Hand', cursive;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 30px;
    }

    .footer-section p {
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 6px;
      color: #d5d8f1;
    }

    .footer-section a {
      color: #63d0ff;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .footer-section a:hover {
      opacity: 0.75;
      text-decoration: underline;
    }

    @media (max-width: 1100px) {
      .players-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 900px) {
      .navbar {
        padding: 12px 16px;
        height: auto;
        flex-wrap: nowrap;
        gap: 10px;
      }

      .logo {
        font-size: 1.8rem;
      }

      .nav-buttons {
        flex-wrap: nowrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .nav-btn {
        font-size: 1rem;
        padding: 6px 14px;
      }

      .explore-page {
        padding: 24px 20px 40px;
      }

      .hero-title-box {
        width: min(520px, 100%);
        padding: 14px 18px;
      }

      .controls-section {
        margin-bottom: 24px;
      }

      .search-row {
        justify-content: flex-end;
        margin-bottom: 18px;
      }

      .filter-row {
        gap: 12px;
      }

      .filter-buttons {
        gap: 10px;
      }

      .filter-btn {
        min-width: 90px;
        padding: 5px 14px;
        font-size: 1rem;
      }

      .search-bar {
        width: 220px;
        font-size: 1.15rem;
      }

      .players-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 20px 16px;
      }

      .section-header {
        margin: 50px 0 22px;
        padding: 10px 16px;
      }

      .section-header h2 {
        font-size: 1.6rem;
      }

      .site-footer {
        padding: 32px 24px 24px;
      }
    }

    @media (max-width: 700px) {
      .navbar {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        flex-wrap: nowrap;
      }

      .nav-buttons {
        width: auto;
        justify-content: flex-end;
        flex-wrap: nowrap;
        gap: 8px;
      }

      .logo {
        font-size: 1.55rem;
      }

      .nav-btn {
        font-size: 0.9rem;
        padding: 5px 8px;
      }

      .explore-page {
        padding: 20px 16px 36px;
      }

      .explore-hero {
        margin: 8px 0 22px;
      }

      .hero-title-box {
        width: 100%;
        padding: 12px 14px;
      }

      .search-row {
        justify-content: center;
        margin-bottom: 14px;
      }

      .search-bar {
        width: min(100%, 280px);
        font-size: 1rem;
        padding: 8px 12px;
      }

      .filter-row {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .filter-buttons {
        justify-content: center;
        gap: 8px;
      }

      .filter-btn {
        min-width: 78px;
        padding: 4px 10px;
        font-size: 0.9rem;
      }

      .players-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px 12px;
      }

      .player-name {
        margin-top: 6px;
      }

      .section-header {
        margin: 36px 0 16px;
      }

      .section-header h2 {
        font-size: 1.4rem;
      }

      .site-footer {
        padding: 28px 18px 22px;
      }
    }

    @media (max-width: 480px) {
      .logo {
        font-size: 1.35rem;
      }

      .nav-btn {
        font-size: 0.8rem;
        padding: 4px 6px;
      }

      .explore-page {
        padding: 18px 12px 32px;
      }

      .hero-title-box {
        border-radius: 12px;
      }

      .search-bar {
        width: 100%;
        max-width: 100%;
      }

      .filter-buttons {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
      }

      .filter-btn {
        min-width: 72px;
      }

      .players-grid {
        gap: 14px 10px;
      }

      .section-header {
        padding: 8px 12px;
      }

      .section-header h2 {
        font-size: 1.25rem;
      }

      .footer-section p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <!-- Nav Bar -->
  <header class="navbar">
    <a href="index.html" class="logo">NBA MVP</a>
    <nav class="nav-buttons">
      <a href="explore.html" class="nav-btn">Explore Players</a>
      <a href="about.html" class="nav-btn">About</a>
    </nav>
  </header>

  <main class="explore-page">

    <!-- Hero Title -->
    <section class="explore-hero">
      <div class="hero-title-box">
        <h1>Explore the Greatness</h1>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls-section">
      <div class="search-row">
        <input type="text" class="search-bar" id="searchBar" placeholder="Search Player" aria-label="Search Player">
      </div>
      <div class="filter-row">
        <span class="filter-label">Filter:</span>
        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="name">Name</button>
          <button class="filter-btn" data-filter="position">Position</button>
          <button class="filter-btn" data-filter="team">Team</button>
        </div>
      </div>
    </section>

    <section class="players-section" id="playersSection"></section>

  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-section">
        <p>&copy; 2026 NBA MVP. All rights reserved.</p>
      </div>

      <div class="footer-section">
        <p>Creative Director: Bean R</p>
        <p>Designer: Christine J</p>
      </div>

      <div class="footer-section">
        <p>Player information, statistics, and historical data sourced from <a href="https://en.wikipedia.org/wiki/NBA_Most_Valuable_Player_Award" target="_blank" rel="noopener">Wikipedia</a>.</p>
      </div>
    </div>
  </footer>

  <script>
    // ALL NBA MVP WINNERS
    const players = [
      { name: "Kareem Abdul-Jabbar", position: "Center", teams: ["Milwaukee Bucks", "Los Angeles Lakers"], color: "#702f8a", img: "images/kareem.webp", profileId: "kareem-abdul-jabbar" },
      { name: "Giannis Antetokounmpo", position: "Power Forward", teams: ["Milwaukee Bucks"], color: "#014816", img: "images/giannis.webp" },
      { name: "Charles Barkley", position: "Power Forward", teams: ["Phoenix Suns"], color: "#e56020", img: "images/charles.webp" },
      { name: "Larry Bird", position: "Small Forward", teams: ["Boston Celtics"], color: "#007a33", img: "images/larry.webp" },
      { name: "Kobe Bryant", position: "Shooting Guard", teams: ["Los Angeles Lakers"], color: "#552583", img: "images/kobe.webp", profileId: "kobe-bryant" },
      { name: "Wilt Chamberlain", position: "Center", teams: ["Philadelphia Warriors", "Philadelphia 76ers"], color: "#e99f06", img: "images/wilt.webp" },
      { name: "Bob Cousy", position: "Point Guard", teams: ["Boston Celtics"], color: "#007a33", img: "images/bob.webp" },
      { name: "Dave Cowens", position: "Center", teams: ["Boston Celtics"], color: "#007a33", img: "images/dave.webp" },
      { name: "Stephen Curry", position: "Point Guard", teams: ["Golden State Warriors"], color: "#ffc72c", img: "images/stephen.webp" },
      { name: "Tim Duncan", position: "Power Forward", teams: ["San Antonio Spurs"], color: "#8c8c8c", img: "images/tim.webp" },
      { name: "Kevin Durant", position: "Small Forward", teams: ["Oklahoma City Thunder"], color: "#007ac1", img: "images/kevin_d.webp" },
      { name: "Joel Embiid", position: "Center", teams: ["Philadelphia 76ers"], color: "#006bb6", img: "images/joel.webp" },
      { name: "Julius Erving", position: "Small Forward", teams: ["Philadelphia 76ers"], color: "#ed174c", img: "images/julius.webp" },
      { name: "Kevin Garnett", position: "Power Forward", teams: ["Minnesota Timberwolves"], color: "#0c2340", img: "images/kevin.webp" },
      { name: "Shai Gilgeous-Alexander", position: "Point Guard", teams: ["Oklahoma City Thunder"], color: "#007ac1", img: "images/shai.webp" },
      { name: "James Harden", position: "Shooting Guard", teams: ["Houston Rockets"], color: "#ce1141", img: "images/james.webp" },
      { name: "Allen Iverson", position: "Shooting Guard", teams: ["Philadelphia 76ers"], color: "#ed174c", img: "images/allen.webp" },
      { name: "LeBron James", position: "Small Forward", teams: ["Cleveland Cavaliers", "Miami Heat"], color: "#6f263d", img: "images/lebron.webp", profileId: "lebron-james" },
      { name: "Magic Johnson", position: "Point Guard", teams: ["Los Angeles Lakers"], color: "#552583", img: "images/magic.webp" },
      { name: "Michael Jordan", position: "Shooting Guard", teams: ["Chicago Bulls"], color: "#ce1141", img: "images/michael.webp", profileId: "michael-jordan" },
      { name: "Nikola Jokic", position: "Center", teams: ["Denver Nuggets"], color: "#0e2240", img: "images/nikola.webp" },
      { name: "Karl Malone", position: "Power Forward", teams: ["Utah Jazz"], color: "#002b5c", img: "images/karl.webp" },
      { name: "Moses Malone", position: "Center", teams: ["Houston Rockets", "Philadelphia 76ers"], color: "#ce1141", img: "images/moses.webp" },
      { name: "Bob McAdoo", position: "Center", teams: ["Buffalo Braves"], color: "#066bbe", img: "images/bob_m.webp" },
      { name: "Steve Nash", position: "Point Guard", teams: ["Phoenix Suns"], color: "#e56020", img: "images/steve.webp" },
      { name: "Dirk Nowitzki", position: "Power Forward", teams: ["Dallas Mavericks"], color: "#00538c", img: "images/dirk.webp" },
      { name: "Shaquille O'Neal", position: "Center", teams: ["Los Angeles Lakers"], color: "#552583", img: "images/shaquille.webp", profileId: "shaquille-oneal" },
      { name: "Hakeem Olajuwon", position: "Center", teams: ["Houston Rockets"], color: "#ce1141", img: "images/hakeem.webp" },
      { name: "Bob Pettit", position: "Power Forward", teams: ["St. Louis Hawks"], color: "#e03a3e", img: "images/bob_p.webp" },
      { name: "Willis Reed", position: "Center", teams: ["New York Knicks"], color: "#f58426", img: "images/willis.webp" },
      { name: "Oscar Robertson", position: "Point Guard", teams: ["Cincinnati Royals"], color: "#5a2d81", img: "images/oscar.webp" },
      { name: "David Robinson", position: "Center", teams: ["San Antonio Spurs"], color: "#8c8c8c", img: "images/david.webp" },
      { name: "Derrick Rose", position: "Point Guard", teams: ["Chicago Bulls"], color: "#ce1141", img: "images/derrick.webp" },
      { name: "Bill Russell", position: "Center", teams: ["Boston Celtics"], color: "#007a33", img: "images/bill.webp" },
      { name: "Wes Unseld", position: "Center", teams: ["Baltimore Bullets"], color: "#002b5c", img: "images/wes.webp" },
      { name: "Bill Walton", position: "Center", teams: ["Portland Trail Blazers"], color: "#e03a3e", img: "images/bill.webp" },
      { name: "Russell Westbrook", position: "Point Guard", teams: ["Oklahoma City Thunder"], color: "#007ac1", img: "images/russell.webp" },
    ];

    const section = document.getElementById('playersSection');
    const searchBar = document.getElementById('searchBar');
    const filterBtns = document.querySelectorAll('.filter-btn');
    let currentFilter = 'name';

    function buildCard(player) {
      const isLink = !!player.profileId;
      const card = document.createElement(isLink ? 'a' : 'article');
      card.className = 'player-card';
      if (isLink) {
        card.href = `player.html?id=${player.profileId}`;
      }

      const nameParts = player.name.split(' ');
      const firstName = nameParts[0];
      const lastName = nameParts.slice(1).join(' ');

      let imgContent;
      if (player.img) {
        imgContent = `<img src="${player.img}" alt="${player.name}">`;
      } else {
        imgContent = `<div class="player-placeholder">${firstName}<br>${lastName}</div>`;
      }

      card.innerHTML = `
        <div class="player-image" style="background: ${player.color};">
          ${imgContent}
        </div>
        <p class="player-name">${firstName}<br>${lastName}</p>
      `;
      return card;
    }

    function renderFlat(list) {
      section.innerHTML = '';
      if (list.length === 0) {
        section.innerHTML = '<p class="no-results">No players found</p>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'players-grid';
      list.forEach(p => grid.appendChild(buildCard(p)));
      section.appendChild(grid);
    }

    function renderGrouped(list, key) {
      section.innerHTML = '';
      if (list.length === 0) {
        section.innerHTML = '<p class="no-results">No players found</p>';
        return;
      }

      const groups = {};
      list.forEach(p => {
        if (key === 'position') {
          const g = p.position;
          if (!groups[g]) groups[g] = [];
          groups[g].push(p);
        } else {
          p.teams.forEach(t => {
            if (!groups[t]) groups[t] = [];
            groups[t].push(p);
          });
        }
      });

      let sortedKeys;
      if (key === 'position') {
        const posOrder = ["Point Guard", "Shooting Guard", "Small Forward", "Power Forward", "Center"];
        sortedKeys = posOrder.filter(p => groups[p]);
      } else {
        sortedKeys = Object.keys(groups).sort();
      }

      sortedKeys.forEach(groupName => {
        const header = document.createElement('div');
        header.className = 'section-header';
        header.innerHTML = `<h2>${groupName}</h2>`;
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'players-grid';
        groups[groupName]
          .sort(sortByLastName)
          .forEach(p => grid.appendChild(buildCard(p)));
        section.appendChild(grid);
      });
    }

    function getLastName(name) {
      const parts = name.split(' ');
      return parts[parts.length - 1];
    }
    function sortByLastName(a, b) {
      return getLastName(a.name).localeCompare(getLastName(b.name));
    }

    function render() {
      const query = searchBar.value.toLowerCase().trim();
      const filtered = players
        .filter(p => p.name.toLowerCase().includes(query))
        .sort(sortByLastName);

      if (currentFilter === 'name') {
        renderFlat(filtered);
      } else {
        renderGrouped(filtered, currentFilter);
      }
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    searchBar.addEventListener('input', render);

    render();
  </script>

</body>

</html>
