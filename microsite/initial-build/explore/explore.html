<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA MVP Explore - Initial Build</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Nav Bar -->
    <header class="navbar">
        <div><a href="../index.html" class="logo">NBA MVP</a></div>
    
        <nav class="nav-buttons">
          <a href="../explore/explore.html" class="nav-btn">Explore Players</a>
          <a href="../about/about.html" class="nav-btn">About</a>
        </nav>
    </header>
    
    <main class="explore-page">
        <section class="explore-hero">
          <div class="hero-title-box">
            <h1>Explore the Greatness</h1>
          </div>
        </section>
    
        <section class="controls-section">
          <div class="search-row">
            <input
              type="text"
              class="search-bar"
              placeholder="Search Player"
              aria-label="Search Player"
            />
          </div>
    
          <div class="filter-row">
            <span class="filter-label">Filter:</span>
    
            <div class="filter-buttons">
              <button class="filter-btn">Name</button>
              <button class="filter-btn">Season</button>
              <button class="filter-btn">Quantity</button>
              <button class="filter-btn">Position</button>
              <button class="filter-btn">Team</button>
            </div>
          </div>
        </section>
    
        <section class="players-section">
          <div class="players-grid">
            <!-- Card placeholders -->
            <article class="player-card">
              <div class="player-image placeholder-purple"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-yellow"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-green"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-red"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-yellow"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-gray"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-green"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-red"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-blue"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-purple"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-red"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-green"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-orange"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-gray"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-green"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-red"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-pink"></div>
              <p class="player-name">Player Name</p>
            </article>
    
            <article class="player-card">
              <div class="player-image placeholder-purple"></div>
              <p class="player-name">Player Name</p>
            </article>
          </div>
        </section>
    </main>
</body>
</html>
