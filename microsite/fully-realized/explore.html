<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA MVP Explore</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
      /* RESET & BASE */
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #050924;
        color: white;
        font-family: 'Patrick Hand SC', cursive;
      }

      /* NAVBAR */
      .navbar {
        background: #10184d;
        border-bottom: 3px solid #a6a6a6;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 22px;
        height: 80px;
      }

      .logo {
        font-size: 2.2rem;
        font-weight: normal;
        color: #f5f5f5;
        text-decoration: none;
        text-shadow: 1px 1px 4px rgba(245,245,245,0.75);
        font-family: 'Patrick Hand SC', cursive;
      }

      .nav-buttons {
        display: flex;
        gap: 12px;
      }

      .nav-btn {
        text-decoration: none;
        background: #f5f5f5;
        color: #222;
        padding: 5px 20px;
        border-radius: 12px;
        border: 3px solid #a6a6a6;
        font-size: 1.4rem;
        font-family: 'Patrick Hand', cursive;
        line-height: 1.4;
      }

      /* EXPLORE PAGE */
      .explore-page {
        width: 100%;
        min-height: 100vh;
        padding: 30px 40px 50px;
      }

      /* HERO TITLE */
      .explore-hero {
        display: flex;
        justify-content: center;
        margin: 10px 0 30px;
      }

      .hero-title-box {
        background: #63d0ff;
        border: 3px solid #a6a6a6;
        border-radius: 16px;
        width: min(620px, 100%);
        text-align: center;
        padding: 16px 20px;
      }

      .hero-title-box h1 {
        color: #050924;
        font-size: 2.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-family: 'Patrick Hand SC', cursive;
        font-weight: normal;
        text-shadow: 1px 1px 4px rgba(5,9,36,0.75);
      }

      /* CONTROLS */
      .controls-section {
        margin-bottom: 28px;
      }

      .search-row {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 22px;
      }

      .search-bar {
        width: 260px;
        max-width: 100%;
        padding: 10px 16px;
        border-radius: 12px;
        border: 3px solid #a6a6a6;
        outline: none;
        font-size: 1.4rem;
        text-align: center;
        background: #f5f5f5;
        color: #111;
        font-family: 'Patrick Hand', cursive;
        box-shadow: 2px 2px 4px rgba(166,166,166,0.75);
      }

      .filter-row {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }

      .filter-label {
        font-size: 1.15rem;
        font-family: 'Patrick Hand', cursive;
        color: #f5f5f5;
      }

      .filter-buttons {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
      }

      .filter-btn {
        background: #db2c3a;
        color: #f5f5f5;
        border: 3px solid #f5f5f5;
        border-radius: 8px;
        padding: 6px 22px;
        min-width: 110px;
        font-size: 1.15rem;
        cursor: pointer;
        font-family: 'Patrick Hand', cursive;
        box-shadow: 2px 2px 4px rgba(245,245,245,0.75);
        text-align: center;
        transition: box-shadow 0.2s;
      }

      .filter-btn.active {
        box-shadow: 0 0 6px 6px rgba(245,245,245,0.5);
      }

      .filter-btn:hover {
        opacity: 0.85;
      }

      /* SECTION HEADER */
      .section-header {
        background: #63d0ff;
        border: 3px solid #a6a6a6;
        border-radius: 16px;
        text-align: center;
        padding: 10px 20px;
        margin: 70px 0 36px;
      }

      .section-header:first-child {
        margin-top: 0;
      }

      .section-header h2 {
        color: #050924;
        font-size: 2rem;
        font-family: 'Patrick Hand SC', cursive;
        font-weight: normal;
        text-shadow: 1px 1px 4px rgba(5,9,36,0.75);
      }

      /* GRID */
      .players-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 24px 20px;
      }

      .player-card {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .player-image {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 18px;
        overflow: hidden;
        position: relative;
      }

      .player-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center bottom;
        position: relative;
        z-index: 1;
      }

      .player-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Patrick Hand', cursive;
        font-size: 1.1rem;
        color: rgba(255,255,255,0.7);
        text-align: center;
        padding: 8px;
        line-height: 1.3;
      }

      .player-name {
        margin-top: 6px;
        font-size: 1.15rem;
        line-height: 1.3;
        color: #f5f5f5;
        font-family: 'Patrick Hand', cursive;
      }

      .no-results {
        text-align: center;
        font-size: 1.5rem;
        color: #a6a6a6;
        font-family: 'Patrick Hand', cursive;
        padding: 60px 0;
      }

      /* RESPONSIVE */
      @media (max-width: 1100px) {
        .players-grid { grid-template-columns: repeat(4, 1fr); }
      }

      @media (max-width: 900px) {
        .navbar { padding: 0 16px; height: 70px; }
        .logo { font-size: 1.8rem; }
        .nav-btn { font-size: 1.1rem; padding: 4px 14px; }

        .explore-page { padding: 24px 24px 40px; }
        .hero-title-box h1 { font-size: 2.2rem; }
        .hero-title-box { width: min(500px, 100%); }

        .players-grid { grid-template-columns: repeat(3, 1fr); gap: 20px 16px; }

        .filter-buttons { gap: 10px; }
        .filter-btn { min-width: 90px; padding: 5px 14px; font-size: 1rem; }
        .search-bar { width: 200px; font-size: 1.2rem; }

        .section-header h2 { font-size: 1.6rem; }
        .section-header { margin: 50px 0 20px; }
      }

      @media (max-width: 600px) {
        .navbar { height: 60px; }
        .logo { font-size: 1.5rem; }
        .nav-buttons { gap: 8px; }
        .nav-btn { font-size: 0.95rem; padding: 4px 10px; border-radius: 8px; }

        .explore-page { padding: 20px 16px 36px; }
        .hero-title-box h1 { font-size: 1.8rem; }
        .hero-title-box { width: 100%; padding: 12px 14px; }

        .players-grid { grid-template-columns: repeat(2, 1fr); gap: 16px 12px; }

        .filter-row { gap: 10px; }
        .filter-buttons { gap: 8px; }
        .filter-btn { min-width: 70px; padding: 4px 10px; font-size: 0.9rem; }
        .filter-label { font-size: 1rem; }
        .search-bar { width: 160px; font-size: 1rem; padding: 8px 10px; }
        .search-row { margin-bottom: 14px; }

        .player-name { font-size: 1rem; }
        .section-header { margin: 36px 0 16px; }
        .section-header h2 { font-size: 1.4rem; }
      }
    </style>
</head>
<body>

  <!-- Nav Bar -->
  <header class="navbar">
    <a href="index.html" class="logo">NBA MVP</a>
    <nav class="nav-buttons">
      <a href="explore.html" class="nav-btn">Explore Players</a>
      <a href="about.html" class="nav-btn">About</a>
    </nav>
  </header>

  <main class="explore-page">

    <!-- Hero Title -->
    <section class="explore-hero">
      <div class="hero-title-box">
        <h1>Explore the Greatness</h1>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls-section">
      <div class="search-row">
        <input type="text" class="search-bar" id="searchBar" placeholder="Search Player" aria-label="Search Player">
      </div>
      <div class="filter-row">
        <span class="filter-label">Filter:</span>
        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="name">Name</button>
          <button class="filter-btn" data-filter="position">Position</button>
          <button class="filter-btn" data-filter="team">Team</button>
        </div>
      </div>
    </section>

    <section class="players-section" id="playersSection"></section>

  </main>

  <script>
    // ALL NBA MVP WINNERS
    // Team color = primary team color for their MVP-winning team
    const players = [
      { name: "Kareem Abdul-Jabbar", position: "Center", teams: ["Milwaukee Bucks", "Los Angeles Lakers"], color: "#702f8a", img: "https://www.figma.com/api/mcp/asset/5af3feb5-b4ff-44d5-bdbc-3abd20c52638" },
      { name: "Giannis Antetokounmpo", position: "Power Forward", teams: ["Milwaukee Bucks"], color: "#014816", img: "https://www.figma.com/api/mcp/asset/77d27c34-bba2-4908-b7b4-0d4c80df4139" },
      { name: "Charles Barkley", position: "Power Forward", teams: ["Phoenix Suns"], color: "#e56020", img: "https://www.figma.com/api/mcp/asset/8f6e046d-1002-4a2c-a9e3-8b016c261a48" },
      { name: "Larry Bird", position: "Small Forward", teams: ["Boston Celtics"], color: "#007a33", img: "https://www.figma.com/api/mcp/asset/d66a5d7a-f37b-4bd3-9561-1e4a33a226a5" },
      { name: "Kobe Bryant", position: "Shooting Guard", teams: ["Los Angeles Lakers"], color: "#552583", img: "" },
      { name: "Wilt Chamberlain", position: "Center", teams: ["Philadelphia Warriors", "Philadelphia 76ers"], color: "#e99f06", img: "https://www.figma.com/api/mcp/asset/1e570902-ede1-402d-ba4f-906ebf7d8b7e" },
      { name: "Bob Cousy", position: "Point Guard", teams: ["Boston Celtics"], color: "#007a33", img: "" },
      { name: "Dave Cowens", position: "Center", teams: ["Boston Celtics"], color: "#007a33", img: "https://www.figma.com/api/mcp/asset/f2bd8415-fc21-4a97-a489-678bc7096225" },
      { name: "Stephen Curry", position: "Point Guard", teams: ["Golden State Warriors"], color: "#ffc72c", img: "https://www.figma.com/api/mcp/asset/f6cffe21-23f4-49e0-9b40-3eb61b888940" },
      { name: "Tim Duncan", position: "Power Forward", teams: ["San Antonio Spurs"], color: "#8c8c8c", img: "https://www.figma.com/api/mcp/asset/cdf2db46-a766-4105-a41f-2e4564edbd0f" },
      { name: "Kevin Durant", position: "Small Forward", teams: ["Oklahoma City Thunder"], color: "#007ac1", img: "https://www.figma.com/api/mcp/asset/49af0735-370e-4ba0-ac81-95564c89c66b" },
      { name: "Joel Embiid", position: "Center", teams: ["Philadelphia 76ers"], color: "#006bb6", img: "https://www.figma.com/api/mcp/asset/98862322-f777-43fe-b2cb-0021c7656db2" },
      { name: "Julius Erving", position: "Small Forward", teams: ["Philadelphia 76ers"], color: "#ed174c", img: "https://www.figma.com/api/mcp/asset/f6cffe21-23f4-49e0-9b40-3eb61b888940" },
      { name: "Kevin Garnett", position: "Power Forward", teams: ["Minnesota Timberwolves"], color: "#0c2340", img: "" },
      { name: "Shai Gilgeous-Alexander", position: "Point Guard", teams: ["Oklahoma City Thunder"], color: "#007ac1", img: "" },
      { name: "James Harden", position: "Shooting Guard", teams: ["Houston Rockets"], color: "#ce1141", img: "" },
      { name: "Allen Iverson", position: "Shooting Guard", teams: ["Philadelphia 76ers"], color: "#ed174c", img: "https://www.figma.com/api/mcp/asset/0bbc622e-0b9f-4537-8de8-ff211092db6d" },
      { name: "LeBron James", position: "Small Forward", teams: ["Cleveland Cavaliers", "Miami Heat"], color: "#6f263d", img: "https://www.figma.com/api/mcp/asset/a97ee97a-8885-4253-b979-a6d455132f9a" },
      { name: "Magic Johnson", position: "Point Guard", teams: ["Los Angeles Lakers"], color: "#552583", img: "" },
      { name: "Michael Jordan", position: "Shooting Guard", teams: ["Chicago Bulls"], color: "#ce1141", img: "https://www.figma.com/api/mcp/asset/bc601e85-e23e-45fa-a41d-b4edd642885f" },
      { name: "Nikola Jokic", position: "Center", teams: ["Denver Nuggets"], color: "#0e2240", img: "https://www.figma.com/api/mcp/asset/a26bd2f4-4cb6-40e0-b526-47f39c64e149" },
      { name: "Karl Malone", position: "Power Forward", teams: ["Utah Jazz"], color: "#002b5c", img: "https://www.figma.com/api/mcp/asset/461227de-ed03-4366-977e-6f34e29b9674" },
      { name: "Moses Malone", position: "Center", teams: ["Houston Rockets", "Philadelphia 76ers"], color: "#ce1141", img: "https://www.figma.com/api/mcp/asset/a1a633a4-496c-43d9-b3c8-8e9cb6c5534a" },
      { name: "Bob McAdoo", position: "Center", teams: ["Buffalo Braves"], color: "#066bbe", img: "https://www.figma.com/api/mcp/asset/0bd52bde-2ace-4948-a3dd-a4b10f378de8" },
      { name: "Steve Nash", position: "Point Guard", teams: ["Phoenix Suns"], color: "#e56020", img: "https://www.figma.com/api/mcp/asset/3777af7d-f83e-44c1-95f2-fb20e7ef4e27" },
      { name: "Dirk Nowitzki", position: "Power Forward", teams: ["Dallas Mavericks"], color: "#00538c", img: "" },
      { name: "Shaquille O'Neal", position: "Center", teams: ["Los Angeles Lakers"], color: "#552583", img: "https://www.figma.com/api/mcp/asset/4d6e3c8e-7b26-4050-9d75-55731b32e7b9" },
      { name: "Hakeem Olajuwon", position: "Center", teams: ["Houston Rockets"], color: "#ce1141", img: "https://www.figma.com/api/mcp/asset/bc601e85-e23e-45fa-a41d-b4edd642885f" },
      { name: "Bob Pettit", position: "Power Forward", teams: ["St. Louis Hawks"], color: "#e03a3e", img: "" },
      { name: "Willis Reed", position: "Center", teams: ["New York Knicks"], color: "#f58426", img: "https://www.figma.com/api/mcp/asset/686c7257-952a-4f3c-9dff-c46cb181b40e" },
      { name: "Oscar Robertson", position: "Point Guard", teams: ["Cincinnati Royals"], color: "#5a2d81", img: "" },
      { name: "David Robinson", position: "Center", teams: ["San Antonio Spurs"], color: "#8c8c8c", img: "https://www.figma.com/api/mcp/asset/962a7d22-3f7a-4cc8-87a4-671273631ba2" },
      { name: "Derrick Rose", position: "Point Guard", teams: ["Chicago Bulls"], color: "#ce1141", img: "" },
      { name: "Bill Russell", position: "Center", teams: ["Boston Celtics"], color: "#007a33", img: "https://www.figma.com/api/mcp/asset/06646e49-65ad-4404-a7b1-f1bbe74ad4d4" },
      { name: "Wes Unseld", position: "Center", teams: ["Baltimore Bullets"], color: "#002b5c", img: "https://www.figma.com/api/mcp/asset/40247092-acf3-475c-8bba-aa6eaca01a5b" },
      { name: "Bill Walton", position: "Center", teams: ["Portland Trail Blazers"], color: "#e03a3e", img: "https://www.figma.com/api/mcp/asset/4fd44136-d985-4d92-abaf-deed1c144bab" },
      { name: "Russell Westbrook", position: "Point Guard", teams: ["Oklahoma City Thunder"], color: "#007ac1", img: "" },
    ];

    const section = document.getElementById('playersSection');
    const searchBar = document.getElementById('searchBar');
    const filterBtns = document.querySelectorAll('.filter-btn');
    let currentFilter = 'name';

    // BUILD A PLAYER CARD
    function buildCard(player) {
      const card = document.createElement('article');
      card.className = 'player-card';

      const nameParts = player.name.split(' ');
      const firstName = nameParts[0];
      const lastName = nameParts.slice(1).join(' ');

      let imgContent;
      if (player.img) {
        imgContent = `<img src="${player.img}" alt="${player.name}">`;
      } else {
        imgContent = `<div class="player-placeholder">${firstName}<br>${lastName}</div>`;
      }

      card.innerHTML = `
        <div class="player-image" style="background: ${player.color};">
          ${imgContent}
        </div>
        <p class="player-name">${firstName}<br>${lastName}</p>
      `;
      return card;
    }

    function renderFlat(list) {
      section.innerHTML = '';
      if (list.length === 0) {
        section.innerHTML = '<p class="no-results">No players found</p>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'players-grid';
      list.forEach(p => grid.appendChild(buildCard(p)));
      section.appendChild(grid);
    }

    function renderGrouped(list, key) {
      section.innerHTML = '';
      if (list.length === 0) {
        section.innerHTML = '<p class="no-results">No players found</p>';
        return;
      }

      const groups = {};
      list.forEach(p => {
        if (key === 'position') {
          const g = p.position;
          if (!groups[g]) groups[g] = [];
          groups[g].push(p);
        } else {
          p.teams.forEach(t => {
            if (!groups[t]) groups[t] = [];
            groups[t].push(p);
          });
        }
      });

      let sortedKeys;
      if (key === 'position') {
        const posOrder = ["Point Guard", "Shooting Guard", "Small Forward", "Power Forward", "Center"];
        sortedKeys = posOrder.filter(p => groups[p]);
      } else {
        sortedKeys = Object.keys(groups).sort();
      }

      sortedKeys.forEach(groupName => {
        const header = document.createElement('div');
        header.className = 'section-header';
        header.innerHTML = `<h2>${groupName}</h2>`;
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'players-grid';
        groups[groupName]
          .sort(sortByLastName)
          .forEach(p => grid.appendChild(buildCard(p)));
        section.appendChild(grid);
      });
    }

    // sort by last name
    function getLastName(name) {
      const parts = name.split(' ');
      return parts[parts.length - 1];
    }
    function sortByLastName(a, b) {
      return getLastName(a.name).localeCompare(getLastName(b.name));
    }

    function render() {
      const query = searchBar.value.toLowerCase().trim();
      const filtered = players
        .filter(p => p.name.toLowerCase().includes(query))
        .sort(sortByLastName);

      if (currentFilter === 'name') {
        renderFlat(filtered);
      } else {
        renderGrouped(filtered, currentFilter);
      }
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    searchBar.addEventListener('input', render);

    render();
  </script>

</body>
</html>
